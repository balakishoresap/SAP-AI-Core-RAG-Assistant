_schema-version: '3.1'
ID: sap-ai-core-rag-assistant
description: RAG-based AI Assistant for SAP BTP
version: 1.0.0

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  # ---------- CAP Service ----------
  - name: rag-assistant-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: rag-assistant-db
      - name: rag-assistant-auth
      - name: rag-assistant-destination
      - name: rag-assistant-connectivity

  # ---------- HANA DB Deployer ----------
  - name: rag-assistant-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
    requires:
      - name: rag-assistant-db

  # ---------- App Router (UI) ----------
  - name: rag-assistant-app
    type: approuter.nodejs
    path: app
    parameters:
      memory: 128M
      disk-quota: 256M
    requires:
      - name: rag-assistant-auth
      - name: srv-api
        group: destinations
        properties:
          name: srv
          url: ~{srv-url}
          forwardAuthToken: true

resources:
  # ---------- HANA Cloud ----------
  - name: rag-assistant-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # ---------- XSUAA ----------
  - name: rag-assistant-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

  # ---------- Destination (AI Core) ----------
  - name: rag-assistant-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  # ---------- Connectivity ----------
  - name: rag-assistant-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite
